name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Lint
        run: |
          npx tsc --noEmit
          npx prettier --check "src/**/*.ts"

      - name: Test
        run: npm test
