name: Release

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify latest CI run on main passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          result=$(gh run list \
            --repo ${{ github.repository }} \
            --branch main \
            --workflow ci.yml \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          if [ "$result" != "success" ]; then
            echo "Latest CI on main: $result. Must be 'success' to release."
            exit 1
          fi

  release:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view "v${VERSION}" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release v${VERSION} already exists."
            exit 1
          fi

      - name: Create GitHub release and upload bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --repo ${{ github.repository }} \
            --title "v${VERSION}" \
            --generate-notes \
            --target main \
            dist/carl.js

      - name: Compute bundle SHA256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA256=$(shasum -a 256 dist/carl.js | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/carl.js"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update Formula/carl-ai.rb
        run: |
          URL=${{ steps.sha.outputs.url }}
          SHA256=${{ steps.sha.outputs.sha256 }}
          npx ts-node scripts/sync-homebrew-formula.ts --url "${URL}" --sha256 "${SHA256}"

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/carl-ai.rb
          git commit -m "chore: Update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push
